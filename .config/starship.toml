[username]
format = ' (fg:current_line)[î‚¶](fg:yellow)[ïگ•](fg:primary bg:yellow)[î‚´ ](fg:yellow bg:box)[$user](fg:foreground bg:box)[î‚´](fg:box) '
show_always = true
