[character]
format = """
[$symbol](fg:current_line) """
success_symbol = '[î¬¬](fg:bold white)'
error_symbol = '[î¬¬](fg:bold red)'

# Keep the line endings consistent
[custom.clear]
format = '(fg:current_line bg:black)'
when = true

[profiles]
transient = """$character"""
