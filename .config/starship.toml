[directory]
#format = '[î‚¶](fg:pink)[َ°·ڈ ](fg:primary bg:pink)[ $read_only$truncation_symbol$path](fg:foreground bg:box)[î‚´](fg:box)'
#format = '[îھƒ ](fg:blue)[$read_only$truncation_symbol$path](fg:blue)'
