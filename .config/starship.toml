symbol = 'î‍¨ '

[python]
format = ' (fg:current_line)[î‚¶](fg:green)[$symbol](fg:primary bg:green)[ (${version})](fg:foreground bg:box)[î‚´](fg:box)'
symbol = 'îœ¼ '

[java]
format = ' (fg:current_line)[î‚¶](fg:red)[$symbol](fg:primary bg:red)[ $version](fg:foreground bg:box)[î‚´](fg:box)'
