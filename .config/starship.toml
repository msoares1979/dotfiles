[lua]
format = ' (fg:current_line)[î‚¶](fg:blue)[$symbol](fg:primary bg:blue)[ $version](fg:foreground bg:box)[î‚´](fg:box)'
symbol = 'îک  '

[fill]
#symbol = 'â”€'
symbol = ' '
style = 'fg:current_line'

[status]
format = " (fg:current_line)[î‚¶](fg:status)[ïپ— ](fg:primary bg:status)[ $status $signal_name](fg:foreground bg:box)[î‚´](fg:box)"
recognize_signal_code = true
pipestatus = true
pipestatus_separator = "-"
pipestatus_segment_format = "$status"
pipestatus_format = " (fg:current_line)[î‚¶](fg:status)[î½¶ ](fg:primary bg:status)[î‚´ ](fg:status bg:box)[ $pipestatus](fg:foreground bg:box)[î‚´](fg:box)"
disabled = false

[cmd_duration]
min_time = 1000
format = ' (fg:current_line)[î‚¶](fg:orange)[ï‰’ ](fg:primary bg:orange)[ $duration](fg:foreground bg:box)[î‚´](fg:box)'

[localip]
format = ' (fg:current_line)[ $localipv4 ]($style)'
