disabled = true

[time]
format = ' (fg:current_line)[î‚¶](fg:purple)[َ°¦– ](fg:primary bg:purple)[ $time](fg:foreground bg:box)[î‚´](fg:box)'
time_format = '%H:%M'
#time_format = "%F %R"
