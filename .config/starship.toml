"$schema" = 'https://starship.rs/config-schema.json'

# See https://github.com/starship/starship/discussions/1107#discussioncomment-11666645

format = """
$directory\
\
$fill\
\
$git_branch\
$git_status\
\
$docker_context\
$golang\
$nodejs\
$python\
$rust\
$c\
$cpp\
$lua\
\
$cmd_duration\
$jobs\
$status\
$memory_usage\
$localip\
$username\
${custom.clear}\
$line_break\
$character\
"""

palette = 'custom'
add_newline = true

